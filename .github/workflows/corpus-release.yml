name: corpus-release

on:
  schedule:
    - cron: "0 9 1 */3 *"  # 09:00 UTC, 1st of every 3rd month
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: msstate-policies/package-lock.json

      - name: Install deps (msstate-policies + worker)
        run: |
          (cd msstate-policies && npm ci)
          (cd worker && npm ci)

      - name: Install Playwright chromium
        working-directory: msstate-policies
        run: npx playwright install --with-deps chromium

      - name: Full corpus rebuild
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/build-worker-corpus.mjs

      - name: Bump patch version + commit + tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd msstate-policies
          OLD=$(node -p "require('./package.json').version")
          npm version patch --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          cd ..
          sed -i "s/\"version\": \"$OLD\"/\"version\": \"$NEW\"/" msstate-policies/.claude-plugin/plugin.json
          sed -i "s/version: \"$OLD\"/version: \"$NEW\"/g; s/\"version\": \"$OLD\"/\"version\": \"$NEW\"/g" worker/src/index.ts
          (cd msstate-policies && npm run build)
          git add msstate-policies/package.json msstate-policies/.claude-plugin/plugin.json worker/src/index.ts msstate-policies/dist/index.js worker/corpus.json msstate-policies/dist/calendar-synonyms.json
          git commit -m "release: v$NEW (quarterly corpus refresh)"
          git tag "v$NEW"
          git push origin main "v$NEW"
          echo "RELEASE_VERSION=$NEW" >> $GITHUB_ENV

      - name: npm publish
        working-directory: msstate-policies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Deploy Worker
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --no-install wrangler deploy
