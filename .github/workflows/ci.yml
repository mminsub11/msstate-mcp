name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: msstate-policies
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: msstate-policies/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: dist/ must be in sync with src/ (body only — banner line 2 is non-deterministic)
        run: |
          # Line 2 of dist/index.js is a banner: "// msstate-policies-mcp <ver> <sha> built <iso>".
          # The <sha> + <iso> are non-deterministic between the local pre-publish build and the
          # CI rebuild. Compare every other line — if the bundle body diverged from the committed
          # one, the maintainer forgot to rebuild after editing src/.
          if ! diff -q <(sed '2d' dist/index.js) <(git show HEAD:msstate-policies/dist/index.js | sed '2d') > /dev/null; then
            echo "ERROR: dist/index.js body differs from src/ — run 'cd msstate-policies && npm run build', then commit"
            diff <(sed '2d' dist/index.js) <(git show HEAD:msstate-policies/dist/index.js | sed '2d') | head -40
            exit 1
          fi
          # embeddings.json has no banner; strict diff is fine.
          git diff --exit-code -- dist/embeddings.json

      - name: Test
        run: npm test

      - name: tools/list smoke test (must list exactly 22 tools — 4 policy + 2 calendar + 3 course + 4 emergency + 4 tuition + 4 online + 1 health)
        run: |
          PAYLOAD='{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}'
          COUNT=$(printf '%s\n' "$PAYLOAD" | node dist/index.js | head -n1 | jq -r '.result.tools | length')
          echo "tool count = $COUNT"
          test "$COUNT" = "22"

      # N6: gate every push/PR on the mechanical security checklist + npm audit
      # so regressions surface in CI rather than at the next manual release.
      - name: msstate-policies npm audit (high+critical)
        run: npm audit --audit-level=high

      - name: worker npm audit (high+critical)
        # Use absolute path via github.workspace — the runner doesn't path-resolve
        # `../worker` against the job's default working-directory (msstate-policies).
        working-directory: ${{ github.workspace }}/worker
        run: |
          if [ -f package-lock.json ]; then
            npm audit --audit-level=high
          else
            echo "skipping worker audit: no package-lock.json"
          fi

      - name: security-checklist gate (must score >= 100)
        working-directory: ${{ github.workspace }}
        run: |
          score=$(bash tools/security-checklist.sh 2>/tmp/checklist.log | tail -1)
          cat /tmp/checklist.log
          echo "score=$score"
          if ! [[ "$score" =~ ^[0-9]+$ ]]; then
            echo "ERROR: checklist did not output a numeric score"
            exit 1
          fi
          if [ "$score" -lt 100 ]; then
            echo "ERROR: security checklist regressed below 100 (now $score)"
            exit 1
          fi
