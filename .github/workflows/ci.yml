name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: msstate-policies
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: msstate-policies/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: dist/ must be in sync with src/
        run: git diff --exit-code dist/

      - name: Test
        run: npm test

      - name: tools/list smoke test (must list exactly 5 tools)
        run: |
          PAYLOAD='{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}'
          COUNT=$(printf '%s\n' "$PAYLOAD" | node dist/index.js | head -n1 | jq -r '.result.tools | length')
          echo "tool count = $COUNT"
          test "$COUNT" = "5"
